name: Linux Environment Validation
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-pipeline:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Backend (Pipeline CLI)
      run: |
        python run_pipeline.py --gene CHRNA7 --structure 7KOX --af 0.001

    - name: Verify Frontend Build
      working-directory: ./ui
      run: |
        npm install
        npm run build

    - name: Check Backend API Startup
      run: |
        # Start uvicorn in the background
        uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &
        sleep 5
        # Check if the server is up
        curl -f http://localhost:8000/api/mapping_report || exit 1

    - name: Check Frontend UI Startup
      working-directory: ./ui
      run: |
        npm run preview &
        sleep 5
        curl -f http://localhost:4173 || exit 1
